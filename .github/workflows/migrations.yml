name: Database Migrations

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'backend/migrations/**'
      - 'backend/app/models/**'
      - '.github/workflows/migrations.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'backend/migrations/**'
      - 'backend/app/models/**'

jobs:
  validate-migrations:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vital_migrations
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
        cache: 'pip'
    
    - name: Install dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirments.txt
    
    - name: Validate migrations
      working-directory: ./backend
      env:
        DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/vital_migrations
      run: |
        alembic upgrade head
        alembic current
        alembic history

    - name: Check for down migrations
      working-directory: ./backend
      env:
        DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/vital_migrations
      run: |
        alembic downgrade -1
        alembic upgrade head
