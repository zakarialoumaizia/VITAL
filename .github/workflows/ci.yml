name: VITAL CI (Frontend & Backend)

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'backend/**'
      - 'vital-app/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'backend/**'
      - 'vital-app/**'
      - '.github/workflows/ci.yml'

jobs:
  # ─── Backend CI ─────────────────────────────────────────────────────────────
  backend-ci:
    name: Backend CI (FastAPI)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || contains(github.event.head_commit.message, '[backend]') || github.ref == 'refs/heads/main'
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vital_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
        cache-dependency-path: './backend/requirements.txt'

    - name: Install Dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install pytest pytest-asyncio httpx black flake8

    - name: Lint Check
      working-directory: ./backend
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings. 
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Test Suite
      working-directory: ./backend
      env:
        DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/vital_test
        SECRET_KEY: ci-test-secret-key-123
      run: |
        if [ -d "tests" ]; then 
          pytest tests/
        else 
          echo "No tests directory found. Skipping tests."
        fi

  # ─── Frontend CI ────────────────────────────────────────────────────────────
  frontend-ci:
    name: Frontend CI (Expo)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || contains(github.event.head_commit.message, '[frontend]') || github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18.x'
        cache: 'npm'
        cache-dependency-path: './vital-app/package-lock.json'

    - name: Install Dependencies
      working-directory: ./vital-app
      run: npm install

    - name: Check Types & Lint
      working-directory: ./vital-app
      run: |
        # Run lint if script exists
        npm run lint || echo "No lint script found"

    - name: Expo Doctor
      working-directory: ./vital-app
      run: npx expo-doctor
