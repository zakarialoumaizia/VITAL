<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La Liaison — Test Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #00C897, #00A8E8);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: #1A1A1A;
      border-radius: 16px;
      width: 100%;
      max-width: 780px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .header {
      background: linear-gradient(135deg, #00C897, #00A8E8);
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header h1 { color: #fff; font-size: 1.2rem; font-weight: 700; }
    .header p  { color: rgba(255,255,255,0.85); font-size: 0.8rem; }
    .dot { width:10px; height:10px; background:#fff; border-radius:50%; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .chat-box {
      height: 420px;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .msg { max-width: 85%; padding: 12px 16px; border-radius: 12px; line-height: 1.5; font-size: 0.88rem; }
    .msg.bot  { background: #2a2a2a; color: #eee; border-radius: 4px 12px 12px 12px; align-self: flex-start; }
    .msg.user { background: linear-gradient(135deg,#00C897,#00A8E8); color: #fff; border-radius: 12px 4px 12px 12px; align-self: flex-end; }
    .msg.error { background: #3a1a1a; color: #ff6b6b; }
    .msg pre { white-space: pre-wrap; font-family: inherit; }

    .section-title {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #00C897;
      margin-bottom: 6px;
      font-weight: 700;
    }
    .palette-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
    .color-chip {
      display: flex; align-items: center; gap: 6px;
      background: #333; border-radius: 8px; padding: 4px 10px;
      font-size: 0.75rem; color: #ccc;
    }
    .color-chip .swatch { width:16px; height:16px; border-radius:4px; border:1px solid rgba(255,255,255,0.2); }

    .form-area {
      padding: 16px 20px;
      background: #111;
      border-top: 1px solid #333;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .row { display: flex; gap: 10px; }
    input, select, textarea {
      background: #2a2a2a; border: 1px solid #444; color: #fff;
      border-radius: 8px; padding: 10px 14px; font-size: 0.88rem;
      outline: none; transition: border 0.2s;
    }
    input:focus, select:focus, textarea:focus { border-color: #00C897; }
    textarea { resize: none; height: 70px; width: 100%; }
    select { flex: 1; }
    input[placeholder] { flex: 1; }
    button {
      background: linear-gradient(135deg, #00C897, #00A8E8);
      color: #fff; border: none; border-radius: 8px;
      padding: 10px 22px; font-size: 0.9rem; font-weight: 600;
      cursor: pointer; transition: opacity 0.2s; white-space: nowrap;
    }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .spinner { display:inline-block; width:14px; height:14px; border:2px solid rgba(255,255,255,0.3); border-top-color:#fff; border-radius:50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="dot"></div>
    <div>
      <h1>🔗 La Liaison — Agent RP & Contenu</h1>
      <p>Instagram · Sponsoring · Palette TPL</p>
    </div>
  </div>

  <div class="chat-box" id="chat">
    <div class="msg bot">
      Salam ! Je suis <b>La Liaison</b>, l'agent branding de CORE.<br><br>
      Décris ton événement ci-dessous et je génère instantanément :<br>
      📸 Une légende Instagram &nbsp;|&nbsp; 📧 Un e-mail de sponsoring &nbsp;|&nbsp; 🎨 Une palette TPL
    </div>
  </div>

  <div class="form-area">
    <textarea id="desc" placeholder="Ex: Hackathon cybersécurité 48h, 150 étudiants, ISSATKR..."></textarea>
    <div class="row">
      <select id="etype">
        <option value="workshop">🛠️ Workshop</option>
        <option value="conference">🎤 Conférence</option>
        <option value="hackathon">💻 Hackathon</option>
      </select>
      <input id="company" type="text" placeholder="Entreprise (ex: TPL)" value="TPL — ISIMA">
      <button id="sendBtn" onclick="generate()">Générer</button>
    </div>
  </div>
</div>

<script>
const API = "http://localhost:5000/generate";

function appendMsg(html, type="bot") {
  const box = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerHTML = html;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function renderPalette(palette) {
  if (!palette || palette.error) return "<i>Palette indisponible</i>";
  let chips = "";
  (palette.colors || []).forEach(c => {
    chips += `<div class="color-chip">
      <div class="swatch" style="background:${c.hex}"></div>
      <span><b>${c.hex}</b> ${c.name}</span>
    </div>`;
  });
  return `
    <div class="section-title">🎨 ${palette.palette_name || "Palette"} — "${palette.inspiration || ""}"</div>
    <div class="palette-row">${chips}</div>
  `;
}

async function generate() {
  const desc    = document.getElementById("desc").value.trim();
  const etype   = document.getElementById("etype").value;
  const company = document.getElementById("company").value.trim() || "TPL — ISIMA";
  const btn     = document.getElementById("sendBtn");

  if (!desc) { appendMsg("⚠️ Entre une description d'événement.", "error"); return; }

  appendMsg(`<b>Toi :</b> ${desc} <br><small>[${etype} · ${company}]</small>`, "user");
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Génération...';
  appendMsg('<span class="spinner"></span> Génération en cours (3 outputs)...', "bot");

  try {
    const res  = await fetch(API, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ description: desc, event_type: etype, company })
    });
    const data = await res.json();

    document.getElementById("chat").lastChild.remove();

    if (data.error) {
      appendMsg("❌ " + data.error, "error");
    } else if (data.type === "greeting" || data.type === "question" || data.type === "unclear") {
      appendMsg(data.reply.replace(/\*\*(.*?)\*\*/g, "<b>$1</b>").replace(/\*(.*?)\*/g, "<i>$1</i>").replace(/\n/g, "<br>"));
    } else {
      appendMsg(`<div class="section-title">📸 Légende Instagram</div><pre>${data.instagram_caption}</pre>`);
      appendMsg(`<div class="section-title">📧 E-mail de Sponsoring → ${company}</div><pre>${data.sponsoring_email}</pre>`);
      appendMsg(renderPalette(data.color_palette));
    }
  } catch(e) {
    document.getElementById("chat").lastChild.remove();
    appendMsg("❌ Impossible de joindre le serveur. Lance <code>python liaison_agent.py</code> d'abord.", "error");
  }

  btn.disabled = false;
  btn.innerHTML = "Générer";
}

document.getElementById("desc").addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); generate(); }
});
</script>
</body>
</html>
