<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CORE — L'Architecte v3</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0a0a0f;font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;color:#e0e0e0}
    .header{width:700px;display:flex;align-items:center;gap:12px;margin-bottom:16px}
    .dot{width:10px;height:10px;background:#00ffe7;border-radius:50%;animation:pulse 1.5s infinite;box-shadow:0 0 8px #00ffe7}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.4)}}
    h1{font-size:18px;font-weight:600;color:#00ffe7;letter-spacing:1px}
    .sub{font-size:11px;color:#555;margin-left:auto}
    .clear-btn{font-size:11px;color:#333;background:none;border:1px solid #1e1e3a;border-radius:6px;padding:3px 8px;cursor:pointer;margin-left:8px}
    .clear-btn:hover{color:#ff4444;border-color:#ff4444}
    .chat-box{width:700px;height:500px;background:#0f0f1a;border:1px solid #1e1e3a;border-radius:16px;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px;scrollbar-width:thin;scrollbar-color:#1e1e3a transparent}
    .msg{display:flex;gap:10px;align-items:flex-start}
    .msg.user{flex-direction:row-reverse}
    .avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;font-weight:700}
    .msg.bot .avatar{background:#00ffe720;border:1px solid #00ffe740;color:#00ffe7}
    .msg.user .avatar{background:#7c3aed30;border:1px solid #7c3aed60;color:#a78bfa}
    .bubble{max-width:560px;padding:10px 14px;border-radius:12px;font-size:13.5px;line-height:1.6;white-space:pre-wrap;word-break:break-word}
    .msg.bot .bubble{background:#12122a;border:1px solid #1e1e3a;color:#d0d0e8}
    .msg.user .bubble{background:#1e0a3a;border:1px solid #4c1d95;color:#e0d0ff}
    .typing .bubble{color:#555;font-style:italic}
    .input-row{width:700px;display:flex;gap:10px;margin-top:12px}
    input{flex:1;background:#0f0f1a;border:1px solid #1e1e3a;border-radius:12px;color:#e0e0e0;font-size:14px;padding:12px 16px;outline:none;transition:border .2s}
    input:focus{border-color:#00ffe7}
    .send{background:#00ffe720;border:1px solid #00ffe740;color:#00ffe7;border-radius:12px;padding:12px 20px;cursor:pointer;font-size:14px;font-weight:600;transition:background .2s}
    .send:hover{background:#00ffe740}
    .quick-btns{width:700px;display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    .qbtn{background:#12122a;border:1px solid #1e1e3a;color:#888;border-radius:8px;padding:6px 12px;cursor:pointer;font-size:12px;transition:all .2s}
    .qbtn:hover{border-color:#00ffe7;color:#00ffe7}
  </style>
</head>
<body>
  <div class="header">
    <div class="dot"></div>
    <h1>CORE — L'Architecte v3</h1>
    <span class="sub">Memory ON · Exam Guard · Budget Guard</span>
    <button class="clear-btn" onclick="clearSession()">Clear Chat</button>
  </div>
  <div class="chat-box" id="chatBox">
    <div class="msg bot">
      <div class="avatar">A</div>
      <div class="bubble">Salam! Je suis L'Architecte v3.

Types supportes : Workshop, Conference, Hackathon
Memoire : activee — je me souviens de votre contexte
Examens bloques : Jan 25, Fev 25, Mai 25, Juin 25, Oct 25

Quel evenement voulez-vous planifier ?</div>
    </div>
  </div>
  <div class="input-row">
    <input type="text" id="userInput" placeholder="Ex: Plan a Hackathon for 200 people, avoid January..."/>
    <button class="send" onclick="sendMessage()">Send</button>
  </div>
  <div class="quick-btns">
    <button class="qbtn" onclick="quickSend('Plan a Hackathon for 200 people, avoid January')">Hackathon 200p</button>
    <button class="qbtn" onclick="quickSend('Plan a workshop for 150 people in June')">Workshop June (exam test)</button>
    <button class="qbtn" onclick="quickSend('Conference for 500 people, budget 1000 TND')">Budget conflict test</button>
    <button class="qbtn" onclick="quickSend('Plan a gaming tournament')">Unknown type test</button>
    <button class="qbtn" onclick="quickSend('Plan a workshop for 200 people')">Workshop 200p</button>
    <button class="qbtn" onclick="quickSend('why did you choose this budget')">Why budget?</button>
  </div>
<script>
  const chatBox = document.getElementById('chatBox');
  const inputEl = document.getElementById('userInput');
  const SESSION_ID = 'session_' + Math.random().toString(36).substr(2,9);

  inputEl.addEventListener('keydown', e => { if(e.key==='Enter') sendMessage(); });
  function quickSend(t){ inputEl.value=t; sendMessage(); }

  async function clearSession(){
    await fetch('http://localhost:8000/session/'+SESSION_ID, {method:'DELETE'});
    chatBox.innerHTML='<div class="msg bot"><div class="avatar">A</div><div class="bubble">Session cleared. New conversation started.</div></div>';
  }

  function addMsg(role, text){
    const d=document.createElement('div');
    d.className='msg '+role;
    d.innerHTML='<div class="avatar">'+(role==='bot'?'A':'U')+'</div><div class="bubble">'+text+'</div>';
    chatBox.appendChild(d);
    chatBox.scrollTop=chatBox.scrollHeight;
    return d;
  }

  async function sendMessage(){
    const text=inputEl.value.trim();
    if(!text) return;
    inputEl.value='';
    addMsg('user', text);
    const typingEl=addMsg('bot typing','Analysing...');
    try{
      const res=await fetch('http://localhost:8000/plan',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({user_input:text, session_id:SESSION_ID})
      });
      const data=await res.json();
      typingEl.remove();
      addMsg('bot', data.recommendation || data.detail || JSON.stringify(data,null,2));
    } catch(err){
      typingEl.remove();
      addMsg('bot','Connection error. Make sure server is running on localhost:8000');
    }
  }
</script>
</body>
</html>
